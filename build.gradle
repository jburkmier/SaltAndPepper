plugins {
    id 'application'
}

repositories {
    mavenCentral()
}

sourceSets {
    main {
        java {
            srcDirs = ['app/src']
        }
    }
}

application {
    mainClass = 'sp.Main'
}

run {
    standardInput = System.in
}

dependencies {
    implementation 'com.mysql:mysql-connector-j:8.3.0'
}

javadoc {
    source = fileTree('app/src'){
        include '**/*.java'
    }
    classpath = files()
    destinationDir = file("$buildDir/docs/javadoc")
}

tasks.register('publishDocs', Copy){
    dependsOn javadoc
    from "$buildDir/docs/javadoc"
    into "$projectDir/docs"
}

build.finalizedBy publishDocs